<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Care Reminder App</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Pet Care Reminder App</h1>
    <p>Gestionarea reminderelor și animalelor de companie</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Creare animal</h2>
      <form id="petForm">
        <label for="petUserId">User ID</label>
        <input type="number" id="petUserId" placeholder="ex: 1" required />

        <label for="petName">Nume</label>
        <input type="text" id="petName" placeholder="ex: Luna" required />

        <label for="petType">Tip</label>
        <input type="text" id="petType" placeholder="ex: dog" required />

        <label for="petBreed">Rasă</label>
        <input type="text" id="petBreed" placeholder="ex: Labrador" required />

        <label for="petAge">Vârstă</label>
        <input type="number" id="petAge" placeholder="ex: 3" required />

        <label for="petNotes">Note</label>
        <textarea id="petNotes" placeholder="Ex: vaccinată"></textarea>

        <button type="submit">Adaugă animal</button>
      </form>
    </section>

    <section class="card">
      <h2>Lista animalelor</h2>
      <div class="actions">
        <button id="loadPetsBtn">Afișează toate animalele</button>
      </div>
      <div class="filter">
        <input type="number" id="filterPetUserId" placeholder="Filtrare după User ID" />
        <button id="filterPetsByUserBtn">Filtrează</button>
      </div>
      <div id="petMessageBox"></div>
      <div id="petsList" class="pets-list"></div>
    </section>

    <section class="card">
      <h2>Creare reminder</h2>
      <form id="reminderForm">
        <label for="petId">Pet ID</label>
        <input type="text" id="petId" placeholder="ex: 6a318..." required />

        <label for="title">Titlu</label>
        <input type="text" id="title" placeholder="ex: Vaccin anual" required />

        <label for="description">Descriere</label>
        <textarea id="description" placeholder="Detalii reminder"></textarea>

        <label for="category">Categorie</label>
        <select id="category">
          <option value="food">Hrană</option>
          <option value="bath">Baie</option>
          <option value="walk">Plimbare</option>
          <option value="vaccine">Vaccin</option>
          <option value="medicine">Medicamente</option>
          <option value="vet">Vizită veterinar</option>
          <option value="other">Altceva</option>
        </select>

        <label for="reminderDate">Data reminderului</label>
        <input type="date" id="reminderDate" required />

        <button type="submit">Creează reminder</button>
      </form>
    </section>

    <section class="card">
      <h2>Acțiuni reminder</h2>
      <div class="actions">
        <button id="loadRemindersBtn">Afișează toate reminderele</button>
        <button id="loadActiveRemindersBtn">Afișează remindere active</button>
      </div>
      <div class="filter">
        <input type="text" id="filterPetId" placeholder="Filtrare după Pet ID" />
        <button id="filterByPetBtn">Filtrează</button>
      </div>
    </section>

    <section class="card">
      <h2>Lista reminderelor</h2>
      <div id="messageBox"></div>
      <div id="remindersList" class="reminders-list"></div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>

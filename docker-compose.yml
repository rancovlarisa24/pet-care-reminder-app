services:
  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      PGHOST: postgres-users
      PGPORT: 5432
      PGUSER: petcare
      PGPASSWORD: petcare
      PGDATABASE: users_db
      JWT_SECRET: petcare-super-secret-dev-key-change-in-prod
      JWT_EXPIRES_IN: 7d
    depends_on:
      postgres-users:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  postgres-users:
    image: postgres:16-alpine
    container_name: postgres-users
    environment:
      POSTGRES_USER: petcare
      POSTGRES_PASSWORD: petcare
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - petcare-network

  reminder-service:
    build:
      context: ./services/reminder-service
    container_name: reminder-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MYSQL_HOST: mysql-reminders
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: reminders_db
      PET_SERVICE_URL: http://pet-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
      JWT_SECRET: petcare-super-secret-dev-key-change-in-prod
      INTERNAL_API_KEY: petcare-internal-service-key-dev
      SCHEDULER_INTERVAL_MS: 30000
    depends_on:
      mysql-reminders:
        condition: service_healthy
      pet-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  mysql-reminders:
    image: mysql:8
    container_name: mysql-reminders
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: reminders_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_reminders_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - petcare-network

  pet-service:
    build:
      context: ./services/pet-service
    container_name: pet-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo-pet:27017/pet_service
      JWT_SECRET: petcare-super-secret-dev-key-change-in-prod
      INTERNAL_API_KEY: petcare-internal-service-key-dev
    depends_on:
      mongo-pet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  mongo-pet:
    image: mongo:6
    container_name: mongo-pet
    volumes:
      - mongo_pet_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      SQLITE_FILE: /data/notifications.db
      JWT_SECRET: petcare-super-secret-dev-key-change-in-prod
      INTERNAL_API_KEY: petcare-internal-service-key-dev
    volumes:
      - notification_data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - user-service
      - pet-service
      - reminder-service
      - notification-service
    networks:
      - petcare-network

volumes:
  postgres_users_data:
  mysql_reminders_data:
  mongo_pet_data:
  notification_data:

networks:
  petcare-network:
    driver: bridge

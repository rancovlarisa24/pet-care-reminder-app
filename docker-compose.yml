services:
  reminder-service:
    build:
      context: ./services/reminder-service
    container_name: reminder-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MYSQL_HOST: mysql-reminders
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DATABASE: reminders_db
      PET_SERVICE_URL: http://pet-service:3002
      NOTIFICATION_SERVICE_URL: http://notification-service:3004
    depends_on:
      mysql-reminders:
        condition: service_healthy
      pet-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  mysql-reminders:
    image: mysql:8
    container_name: mysql-reminders
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: reminders_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_reminders_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - petcare-network

  pet-service:
    build:
      context: ./services/pet-service
    container_name: pet-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo-pet:27017/pet_service
    depends_on:
      mongo-pet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  mongo-pet:
    image: mongo:6
    container_name: mongo-pet
    volumes:
      - mongo_pet_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petcare-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - pet-service
      - reminder-service
      - notification-service
    networks:
      - petcare-network

volumes:
  mysql_reminders_data:
  mongo_pet_data:

networks:
  petcare-network:
    driver: bridge
